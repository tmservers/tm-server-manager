[workspace]
members = [
    "gamebox-files",
    "tm-leaderboard-worker",
    "tm-server-bridge",
    "tm-server-client",
    "tm-server-types",
    "tm-tourney-manager",
    "tm-tourney-manager-admin",
    "tm-tourney-manager-api-rs",
    "tm-tourney-manager-test",
]
resolver = "3"

[workspace.package]
version = "0.0.4-dev"
authors = ["kistz (Kilian Strunz)"]
keywords = ["trackmania", "nadeo", "gbxremote", "gbx", "api", "xml-rpc"]
categories = [
    "api-bindings",
    "network-programming",
    "asynchronous",
    "trackmania",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/kistz/tm-tourney-manager"
edition = "2024"


[workspace.dependencies.tokio]
features = ["full"]
version = "1"

[workspace.dependencies.tm-tourney-manager-api-rs]
path = "./tm-tourney-manager-api-rs"

[workspace.dependencies]
takumi = "0"
dotenvy = "0.15"
spacetimedb = "1.9"
spacetimedb-lib = "1.9"
spacetimedb-sdk = "1.9"

testcontainers = { version = "0", default-features = false, features = [
    "blocking",
] }
