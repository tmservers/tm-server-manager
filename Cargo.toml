[workspace]
members = [
    "gamebox-files",
    "tm-leaderboard-worker",
    "tm-server-bridge",
    "tm-server-client",
    "tm-server-types",
    "tm-tourney-manager",
    "tm-tourney-manager-api-rs",
    "tm-tourney-manager-test",
]
resolver = "3"

[workspace.package]
version = "0.0.4-dev"
authors = ["kistz (Kilian Strunz)"]
keywords = ["trackmania", "nadeo", "gbxremote", "gbx", "api", "xml-rpc"]
categories = [
    "api-bindings",
    "network-programming",
    "asynchronous",
    "trackmania",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/kistz/tm-tourney-manager"
edition = "2024"


[workspace.dependencies]
#==================
# Util Dependencies
#==================
takumi = "0"
dotenvy = "0.15"
tokio = { features = ["full"], version = "1" }
base64 = { version = "*" }


#============
# SpacetimeDB
#============
spacetimedb = { version = "1.11", features = ["unstable"] }
spacetimedb-lib = "1.11"
spacetimedb-sdk = "1.11"


#==============
# Worspace Deps
#==============
gamebox-files = { path = "./gamebox-files" }
tm-tourney-manager-api-rs = { path = "./tm-tourney-manager-api-rs" }
tm-server-types = { path = "./tm-server-types" }
tm-server-client = { path = "./tm-server-client" }


#=======
#Testing
#=======

testcontainers = { version = "0", default-features = false, features = [
    "blocking",
] }
insta = { version = "1", features = ["yaml"] }
