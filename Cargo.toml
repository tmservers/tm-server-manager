[workspace]
members = [
    "tm-server-bridge",
    "tm-server-client",
    "tm-server-types",
    "tm-tourney-manager",
    "tm-tourney-manager-admin",
    "tm-tourney-manager-api-rs",
]
resolver = "3"

[workspace.package]
version = "0.0.4-dev"
authors = ["kistz (Kilian Strunz)"]
keywords = ["trackmania", "nadeo", "gbxremote", "gbx", "api", "xml-rpc"]
categories = [
    "api-bindings",
    "network-programming",
    "asynchronous",
    "trackmania",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/kistz/tm-tourney-manager"
edition = "2024"

[workspace.dependencies.spacetimedb]
version = "1.6"

[workspace.dependencies.spacetimedb-lib]
version = "1.6"

[workspace.dependencies.spacetimedb-sdk]
version = "1.6"
